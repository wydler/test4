name: Update selfoss

on:
  workflow_dispatch: # Workflow manuell auslösbar

permissions:
  contents: write        # Erlaubt Push/Änderungen an Repo-Inhalten
  pull-requests: write   # Erlaubt Erstellen von Pull Requests

jobs:
  selfoss-update:
    runs-on: ubuntu-latest
    name: Selfoss Snapshot Update

    steps:
      # Holt den aktuellen Code aus dem Repository
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        
      - name: Pruefe neue Version bei Cloudsmith
        id: check
        run: |
          # Aktuelle Version aus selfoss.snapshot auslesen
          CURRENT_VERSION=$(grep '^VERSION=' selfoss.snapshot | cut -d '=' -f2)
          echo "Aktuelle Version: $CURRENT_VERSION"

          # Cloudsmith API aufrufen, sortiert nach Datum absteigend
          curl -s "https://api.cloudsmith.io/packages/fossar/selfoss-git/?page=1&page_size=20&sort=-date" > versions.json

          # Nächsthöhere Version finden, die größer als die aktuelle ist
          NEXT_VERSION=$(jq -r --arg current "$CURRENT_VERSION" '
            . as $all
            | map(.version)                         # nur Versionsstrings
            | (index($current)) as $i               # Position der aktuellen Version
            | if $i == 0 or $i == null then "" else .[$i-1] end
          ' versions.json)

          # Prüfen, ob eine neue Version gefunden wurde
          if [ -z "$NEXT_VERSION" ]; then
            echo "Keine neue Version gefunden"
            echo "update=false" >> $GITHUB_OUTPUT
          else
            echo "Neue Version: $NEXT_VERSION"
  
            # SHA256 Hash zur gefundenen Version aus dem JSON extrahieren
            NEXT_SHA=$(jq -r --arg v "$NEXT_VERSION" '.[] | select(.version == $v) | .checksum_sha256' versions.json)
            echo "SHA256: $NEXT_SHA"
  
            # Workflow-Ausgaben setzen, damit spätere Schritte darauf zugreifen können
            echo "update=true" >> $GITHUB_OUTPUT
            echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
            echo "cversion=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "sha=$NEXT_SHA" >> $GITHUB_OUTPUT
          fi

          # Temporäre Datei löschen
          rm versions.json

      - name: Aktualisiere selfoss.snapshot
        if: steps.check.outputs.update == 'true'
        run: |
          # Variablen aus Workflow-Ausgaben
          VERSION=${{ steps.check.outputs.version }}
          SHA=${{ steps.check.outputs.sha }}

          # selfoss.snapshot mit neuer Version und SHA aktualisieren
          sed -i "s/^VERSION=.*/VERSION=$VERSION/" selfoss.snapshot
          sed -i "s/^SHA256_HASH=.*/SHA256_HASH=$SHA/" selfoss.snapshot

          # Kontrolle: die aktualisierte Datei ausgeben
          echo "Neue Datei:"
          cat selfoss.snapshot

      - name: Pull Request erstellen
        if: steps.check.outputs.update == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          # Commit- und PR-Title mit Versionsinformationen
          commit-message: "Update selfoss from ${{ steps.check.outputs.cversion }} to ${{ steps.check.outputs.version }}"
          title: "chore(deps): Update selfoss from ${{ steps.check.outputs.cversion }} to ${{ steps.check.outputs.version }}"
          # PR-Body mit Übersicht und Konfigurationshinweisen
          body: |
            This PR contains the following updates:
            | Package | Type | Update | Change |
            |---|---|---|---|
            | selfoss | snapshot | minor | `${{ steps.check.outputs.cversion }}` → `${{ steps.check.outputs.version }}` |

            SHA256: ${{ steps.check.outputs.sha }}
            
            ---

            ### Configuration

            📅 **Schedule**: (in timezone Europe/Berlin)

            - Branch creation
              - At any time (no schedule defined)
            - Automerge
              - At any time (no schedule defined)

            🚦**Automerge**: Disabled by config. Please merge this manually once you are satisfied.

            🔕 **Ignore**: Close this PR and you won't be reminded about these updates again.

            ---

            This PR has been generated by [Renovate Dependency App](https://github.com/apps/renovate-dependency-app).
          # Branchname für den PR
          branch: renovate/apps/selfoss-${{ steps.check.outputs.version }}
          # Labels, die dem PR hinzugefügt werden
          labels: |
            dependencies
            apps
