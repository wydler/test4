---
name: Upload new certificate

"on":
  pull_request:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  check:
    name: Check new certificates
    runs-on: ubuntu-latest

    steps:
      - name: Get repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check file name and location
        shell: pwsh
        run: |
          
          $files = Get-ChildItem -Path "upload" -Filter "*.cer" | Select -ExpandProperty FullName


          foreach ($file in $files) {

            $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($file)

            if ($cert.Issuer -match 'CN=([^,]+)') {
                $cn = $Matches[1]
            }
            elseif ($cert.Issuer -match 'O=([^,]+)') {
                $ou = $Matches[1]
            }
            elseif ($cert.Issuer -match 'C=([^,]+)') {
                $c = $Matches[1]
            }
            elseif ($cert.Issuer -match 'DC=([^,]+)') {
                $dc = $Matches[1]
            }
            else {
                $o = "Various"
            }

            #####

            $CertCn = (($cert.Issuer.Split(','))[0]).split('=')[1]
            $certOrg = (($cert.Issuer.Split(','))[1]).split('=')[1]

            $FolderNameYear= $cert.NotBefore.Year
            $FileNameThumbprint = $cert.Thumbprint
            $fileExtension = [System.IO.Path]::GetExtension($file).Trim(".")

            #####

            $bc = $cert.Extensions | Where-Object { $_ -is [System.Security.Cryptography.X509Certificates.X509BasicConstraintsExtension] } | Select-Object -First 1

            if ($bc.CertificateAuthority) {
                Write-Output "CA Certificate`n"
            }
            else {
                Write-Output "Server Certificate`n"
                exit 1
            }
            
            #####

            [array] $characterMap = @(
                @(' ','_'),
                @('<','-'),
                @('>','-'),
                @(':','-'),
                @('/','-'),
                @('\\','-'),
                @('\|','-'),
                @('\?','-'),
                @('\*','-'),
                @('\.$','')
             )

            $characterMap | ForEach-Object {
                $CertCn = $CertCn -replace($_[0],$_[1])
                $certOrg = $certOrg -replace($_[0],$_[1])
            }

            #####

            if ($cert.Issuer -eq $cert.Subject) {
                #
                $basePath = "roots"
            }
            else {
                #
                $basePath = "intermediaries"
            }

            $targetPath = Join-Path $basePath $certOrg
            $targetPath = Join-Path $targetPath $FolderNameYear
            $filename = "$($CertCn)_$($FileNameThumbprint).$fileExtension"
            Write-Output "`n$targetPath`n"
            New-Item -ItemType Directory -Path $targetPath -Verbose
            $destination = Join-Path $targetPath $filename

            # Write-Output "$targetPath/$($CertCn)_$($FileNameThumbprint).$fileExtension"
            
            Write-Output "`nDestination"
            Write-Output "$destination`n"

            Write-Output "`nFile"
            Write-Output "$file`n"
            
            Write-Output "move"
            Write-Host "Source: $file"
            Write-Host "Target: $destination"
            
            if (Test-Path $file) {
                Move-Item -Path $file -Destination $destination -Force -Verbose
                Write-Host "Moved successfully"
            } else {
                Write-Host "File not found!"
                exit 1
            }

            git status
          }

      - name: Create Pull Request
        uses: devops-infra/action-pull-request@b2895bff2ff66579f6704d717a1ea75fad919e84
        with:
          github_token: ${{ secrets.NSP_GH_TOKEN }}
          source_branch: ${{ github.ref_name }}
          target_branch: master
          title: "Automated certificate upload"
          body: |
            This PR was automatically created after processing uploaded certificates.
            
            - Certificates were validated
            - Files were reorganized into CA structure
