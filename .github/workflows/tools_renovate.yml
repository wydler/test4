---
name: Tools - Renovate

"on":
  workflow_dispatch:
    inputs:
      logLevel:
        type: choice 
        required: false
        options: 
          - info
          - debug
        default: "info"


permissions:
  contents: write
  pull-requests: write
  issues: write


jobs:
  renovate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: generate-token
        with:
          app-id: ${{ secrets.GH_APP_RDP_ID }}
          private-key: ${{ secrets.GH_APP_RDP_PRIVATE_KEY }}
          
      - name: Run Renovate
        uses: renovatebot/github-action@b67590ea780158ccd13192c22a3655a5231f869d  # v46.1.8
        with:
          token: ${{ steps.generate-token.outputs.token }}
          # token: ${{ secrets.GH_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          # Repository taken from variable to keep configuration file generic
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # This flag will stop renovate from trying to create an onboarding PR, instead it will look for renovate.json file and run
          RENOVATE_ONBOARDING: "false"
          RENOVATE_DEPENDENCY_DASHBOARD_AUTOCLOSE: "true"